services:
  db:
    image: postgres:15-alpine
    container_name: duty-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - duty_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  duty-service:
    build: .
    container_name: duty-service
    ports:
      - "8003:8003"
      - "50053:50053"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    command: uvicorn src.main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=2).read()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  duty_db_data:
  duty_data:
